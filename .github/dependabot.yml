version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Tirane
    # Keep routine version churn to one review at a time. Security updates use
    # GitHub's separate security-update limit and the group below.
    open-pull-requests-limit: 1
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - '*'
      npm-minor-and-patch:
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: wednesday
      time: '06:00'
      timezone: Europe/Tirane
    # Keep routine version churn to one review at a time. Security updates use
    # GitHub's separate security-update limit and the group below.
    open-pull-requests-limit: 1
    groups:
      actions-security:
        applies-to: security-updates
        patterns:
          - '*'
      actions-minor-and-patch:
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - minor
          - patch
